<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Learning Path — llm-kit</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    html, body { overflow-x: hidden; }

    /* ── Floating background characters ── */
    .fc {
      position: fixed; pointer-events: none; z-index: 0;
      opacity: .09;
    }
    @keyframes fl1 {
      0%,100%{transform:translateY(0) rotate(-4deg)}
      50%{transform:translateY(-22px) rotate(6deg)}
    }
    @keyframes fl2 {
      0%,100%{transform:translateY(-8px) rotate(5deg)}
      50%{transform:translateY(14px) rotate(-4deg)}
    }
    @keyframes fl3 {
      0%,100%{transform:translateX(0) rotate(3deg)}
      33%{transform:translateX(12px) rotate(-5deg)}
      66%{transform:translateX(-8px) rotate(7deg)}
    }
    @keyframes fl4 {
      0%,100%{transform:translateY(0) rotate(0deg)}
      50%{transform:translateY(-18px) rotate(-8deg)}
    }
    @keyframes fl5 {
      0%,100%{transform:translateX(0) translateY(0)}
      25%{transform:translateX(8px) translateY(-12px)}
      75%{transform:translateX(-10px) translateY(8px)}
    }

    /* ── Top nav ── */
    .game-nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(6,1,15,.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,.07);
      padding: 14px 24px;
      display: flex; align-items: center; gap: 20px;
    }
    .game-back {
      font-family: var(--mono); font-size: 12px;
      color: var(--faint); text-decoration: none;
      transition: color .2s; flex-shrink: 0;
      white-space: nowrap;
    }
    .game-back:hover { color: var(--purple); }
    .game-title {
      font-family: var(--mono); font-size: 13px; font-weight: 700;
      color: var(--muted); flex-shrink: 0;
    }

    /* ── Progress bar ── */
    .game-prog {
      flex: 1; min-width: 0;
    }
    .game-prog-lbl {
      font-family: var(--mono); font-size: 10px;
      color: var(--muted); margin-bottom: 5px;
      display: flex; justify-content: space-between;
    }
    .game-prog-track {
      height: 5px; background: rgba(255,255,255,.06);
      border-radius: 99px; overflow: hidden;
    }
    .game-prog-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(to right, var(--purple), var(--cyan));
      box-shadow: 0 0 8px rgba(167,139,250,.5);
      transition: width .7s cubic-bezier(.22,1,.36,1);
    }

    /* ── Page header ── */
    .game-header {
      text-align: center; padding: 48px 24px 24px;
      position: relative; z-index: 1;
    }
    .game-header-badge {
      font-family: var(--mono); font-size: 11px;
      background: rgba(167,139,250,.08);
      border: 1px solid rgba(167,139,250,.2);
      border-radius: 99px; padding: 4px 14px;
      color: var(--purple); letter-spacing: .12em;
      display: inline-block; margin-bottom: 16px;
    }
    .game-header-title {
      font-family: var(--mono); font-weight: 900;
      font-size: clamp(28px, 5vw, 48px);
      color: var(--text); letter-spacing: -.03em;
      line-height: 1.1; margin-bottom: 10px;
    }
    .game-header-title span { color: var(--purple); }
    .game-header-sub {
      font-family: var(--mono); font-size: 13px;
      color: var(--faint); max-width: 420px; margin: 0 auto;
      line-height: 1.6;
    }

    /* ── Path container ── */
    .path-wrap {
      position: relative; z-index: 1;
      max-width: 580px; margin: 32px auto 100px;
      padding: 0 20px;
    }

    /* ── Step row ── */
    .step-row {
      display: flex;
    }
    .step-row.left  { justify-content: flex-start; }
    .step-row.right { justify-content: flex-end; }

    /* ── Connector SVG ── */
    .step-conn {
      display: block; width: 100%; height: 60px;
      overflow: visible;
    }

    /* ── Level card ── */
    .lvl-card {
      width: 240px; flex-shrink: 0;
      background: var(--bg2);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 18px; padding: 18px 20px;
      position: relative;
      transition: all .4s cubic-bezier(.22,1,.36,1);
    }

    /* LOCKED */
    .lvl-card.locked {
      filter: grayscale(.85) blur(.6px);
      opacity: .38;
    }
    .lvl-card.locked .lvl-btn-area { display: none; }

    /* UNLOCKED */
    .lvl-card.unlocked {
      border-color: #f59e0b;
      box-shadow: 0 0 0 1px rgba(245,158,11,.25),
                  0 0 28px rgba(245,158,11,.18);
      animation: glow-amber 3s ease-in-out infinite;
    }
    @keyframes glow-amber {
      0%,100%{ box-shadow: 0 0 0 1px rgba(245,158,11,.25), 0 0 28px rgba(245,158,11,.15); }
      50%    { box-shadow: 0 0 0 2px rgba(245,158,11,.5),  0 0 44px rgba(245,158,11,.32); }
    }

    /* COMPLETED */
    .lvl-card.completed {
      border-color: rgba(251,191,36,.45);
      box-shadow: 0 0 0 1px rgba(251,191,36,.15);
    }

    /* Pop animation on unlock */
    @keyframes unlock-pop {
      0%  { transform: scale(.88); opacity: .4; }
      65% { transform: scale(1.06); }
      100%{ transform: scale(1);   opacity: 1; }
    }
    .lvl-card.just-unlocked {
      animation: unlock-pop .55s cubic-bezier(.22,1,.36,1) forwards,
                 glow-amber 3s ease-in-out .55s infinite;
    }

    /* ── Card internals ── */
    .lvl-status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      letter-spacing: .12em; padding: 3px 9px;
      border-radius: 99px; border: 1px solid;
      margin-bottom: 10px;
    }
    .badge-locked   { color: var(--faint);  border-color: rgba(255,255,255,.1); }
    .badge-unlocked { color: #f59e0b;       border-color: rgba(245,158,11,.4);  background: rgba(245,158,11,.08); }
    .badge-completed{ color: #fbbf24;       border-color: rgba(251,191,36,.4);  background: rgba(251,191,36,.08); }

    .lvl-num {
      font-family: var(--mono); font-size: 10px; font-weight: 700;
      letter-spacing: .18em; color: var(--faint);
      margin-bottom: 5px; display: flex; align-items: center; gap: 8px;
    }
    .lvl-card.unlocked  .lvl-num { color: #f59e0b; }
    .lvl-card.completed .lvl-num { color: #fbbf24; }

    .lvl-name {
      font-family: var(--mono); font-size: 14px; font-weight: 700;
      color: var(--text); margin-bottom: 6px; line-height: 1.3;
    }
    .lvl-card.locked    .lvl-name { color: var(--faint); }
    .lvl-card.completed .lvl-name { color: var(--text); }

    .lvl-desc {
      font-family: var(--mono); font-size: 11px;
      color: var(--faint); line-height: 1.55; margin-bottom: 14px;
    }

    .lvl-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--mono); font-size: 12px; font-weight: 700;
      padding: 7px 16px; border-radius: 99px;
      border: none; cursor: pointer; text-decoration: none;
      transition: transform .15s, background .2s;
    }
    .lvl-btn:hover { transform: scale(1.06); }
    .btn-start  { background: #f59e0b; color: #06010f; }
    .btn-start:hover { background: #fbbf24; }
    .btn-review { background: rgba(251,191,36,.1); color: #fbbf24; border: 1px solid rgba(251,191,36,.3); }
    .btn-review:hover { background: rgba(251,191,36,.2); }

    /* ── Reset button (bottom) ── */
    .game-reset {
      display: block; text-align: center;
      font-family: var(--mono); font-size: 11px;
      color: var(--faint); background: none; border: none;
      cursor: pointer; margin: 0 auto 60px; padding: 8px 16px;
      transition: color .2s;
    }
    .game-reset:hover { color: var(--red); }

    @media(max-width:520px){
      .lvl-card { width: 200px; }
      .game-title { display: none; }
    }
  </style>
</head>
<body>

<canvas id="ai-canvas" style="opacity:.08;"></canvas>

<!-- ── Nav ── -->
<nav class="game-nav">
  <a href="index.html" class="game-back">← back to all tools</a>
  <span class="game-title">🎮 learning path</span>
  <div class="game-prog">
    <div class="game-prog-lbl">
      <span id="prog-label">LVL 1 / 16 — 0% complete</span>
      <span id="prog-pct"></span>
    </div>
    <div class="game-prog-track">
      <div class="game-prog-fill" id="prog-fill" style="width:0%"></div>
    </div>
  </div>
</nav>

<!-- ── Header ── -->
<header class="game-header">
  <div class="game-header-badge">16 levels · localStorage progress</div>
  <h1 class="game-header-title">decode <span>AI</span><br>one level at a time</h1>
  <p class="game-header-sub">Complete each concept to unlock the next. No skipping. No shortcuts. Just understanding.</p>
</header>

<!-- ── Path ── -->
<main class="path-wrap" id="path-wrap">
  <!-- Rendered by JS -->
</main>

<button class="game-reset" onclick="resetProgress()">↺ reset progress</button>

<script src="js/main.js"></script>
<script>
const LEVELS = [
  { name:'How LLMs Work',       desc:'From text to probability — the core prediction loop',         url:'tools/llm.html'            },
  { name:'Tokenization',         desc:'How text breaks into the atomic units LLMs actually read',    url:'tools/tokens.html'         },
  { name:'Transformer',          desc:'The architecture powering every modern language model',        url:'tools/transformer.html'    },
  { name:'Attention Mechanism',  desc:'How tokens attend to each other with Q, K, V matrices',       url:'tools/attention.html'      },
  { name:'Embeddings',           desc:'Words as vectors — meaning represented as geometry',          url:'tools/embeddings.html'     },
  { name:'RAG Pipeline',         desc:'Giving LLMs access to external knowledge at inference time',  url:'tools/rag.html'            },
  { name:'Fine-tuning',          desc:'Specializing a pretrained model for your specific task',      url:'tools/fine-tuning.html'    },
  { name:'RLHF',                 desc:'How human feedback trains LLMs to align with our values',     url:'tools/rlhf.html'           },
  { name:'Prompt Engineering',   desc:'Patterns and techniques that reliably improve outputs',       url:'tools/prompt.html'         },
  { name:'Temperature & Sampling',desc:'Controlling randomness — from greedy to creative',          url:'tools/temperature.html'    },
  { name:'Context Window',       desc:'The memory limit — what fits, what falls off, what matters',  url:'tools/context.html'        },
  { name:'Chain of Thought',     desc:'Making LLMs reason step by step before answering',            url:'tools/cot.html'            },
  { name:'Training Process',     desc:'Forward pass, loss, backprop — how weights actually learn',   url:'tools/training.html'       },
  { name:'Vector Database',      desc:'Storing and searching billions of embeddings at scale',       url:'tools/vector-db.html'      },
  { name:'Diffusion Models',     desc:'Noise to image — how DALL-E and Stable Diffusion work',      url:'tools/diffusion.html'      },
  { name:'KV Cache',             desc:'Why generation speeds up dramatically after the first token', url:'tools/kv-cache.html'       },
];

const KEY = 'llmkit-progress';

function loadProgress() {
  try {
    const s = localStorage.getItem(KEY);
    if (s) {
      const p = JSON.parse(s);
      if (Array.isArray(p) && p.length === LEVELS.length) return p;
    }
  } catch(e) {}
  return LEVELS.map((_, i) => i === 0 ? 'unlocked' : 'locked');
}

function saveProgress(p) {
  localStorage.setItem(KEY, JSON.stringify(p));
}

function completedCount(p) {
  return p.filter(s => s === 'completed').length;
}

function currentLevel(p) {
  const u = p.findIndex(s => s === 'unlocked');
  return u >= 0 ? u + 1 : completedCount(p);
}

function updateProgressBar(p) {
  const done  = completedCount(p);
  const pct   = Math.round((done / LEVELS.length) * 100);
  const cur   = currentLevel(p);
  document.getElementById('prog-fill').style.width  = pct + '%';
  document.getElementById('prog-label').textContent =
    `LVL ${cur} / ${LEVELS.length} — ${pct}% complete`;
}

function handleStart(index) {
  const p = loadProgress();
  p[index] = 'completed';
  if (index + 1 < LEVELS.length && p[index + 1] === 'locked') {
    p[index + 1] = 'unlocked';
  }
  saveProgress(p);
  // re-render then navigate
  render(p, index + 1);
  setTimeout(() => { window.open(LEVELS[index].url, '_blank'); }, 280);
}

function resetProgress() {
  if (!confirm('Reset all progress?')) return;
  localStorage.removeItem(KEY);
  render(loadProgress(), -1);
}

// ── SVG connectors ──
// viewBox 0 0 540 60, left card center ≈ 110, right card center ≈ 430
function connSVG(dir) {
  const [x1, x2] = dir === 'lr' ? [110, 430] : [430, 110];
  return `<svg class="step-conn" viewBox="0 0 540 60" preserveAspectRatio="none" aria-hidden="true">
    <path d="M ${x1} 2 C ${x1} 30, ${x2} 30, ${x2} 58"
      fill="none" stroke="#f59e0b" stroke-width="2"
      stroke-dasharray="7 5" opacity="0.35"/>
    <circle cx="${x2}" cy="58" r="4" fill="#f59e0b" opacity="0.45"/>
  </svg>`;
}

function render(p, justUnlocked) {
  const wrap = document.getElementById('path-wrap');
  let html = '';

  LEVELS.forEach((lvl, i) => {
    const state = p[i];
    const side  = i % 2 === 0 ? 'left' : 'right';
    const justU = i === justUnlocked;
    const num   = String(i + 1).padStart(2, '0');

    // badge
    let badge = '';
    if      (state === 'locked')    badge = '<span class="lvl-status-badge badge-locked">🔒 LOCKED</span>';
    else if (state === 'unlocked')  badge = '<span class="lvl-status-badge badge-unlocked">⚡ UNLOCKED</span>';
    else                            badge = '<span class="lvl-status-badge badge-completed">✓ COMPLETED</span>';

    // button
    let btn = '';
    if (state === 'unlocked') {
      btn = `<div class="lvl-btn-area">
        <button class="lvl-btn btn-start" onclick="handleStart(${i})">START →</button>
      </div>`;
    } else if (state === 'completed') {
      btn = `<div class="lvl-btn-area">
        <a class="lvl-btn btn-review" href="${lvl.url}" target="_blank">review ↗</a>
      </div>`;
    }

    html += `
    <div class="step-row ${side}">
      <div class="lvl-card ${state}${justU ? ' just-unlocked' : ''}" id="lvl-${i}">
        ${badge}
        <div class="lvl-num">LVL ${num}</div>
        <div class="lvl-name">${lvl.name}</div>
        <div class="lvl-desc">${lvl.desc}</div>
        ${btn}
      </div>
    </div>`;

    // connector (not after last)
    if (i < LEVELS.length - 1) {
      const dir = side === 'left' ? 'lr' : 'rl';
      html += connSVG(dir);
    }
  });

  wrap.innerHTML = html;
  updateProgressBar(p);
}

// ── Init ──
render(loadProgress(), -1);
</script>
</body>
</html>
